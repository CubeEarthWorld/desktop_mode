<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">External Display Touchpad icon</title>
  <desc id="desc">A slim smartphone used as a touchpad in front of an external display with equal bezel widths, a simple desktop window, and the app's circular cursor.</desc>

  <defs>
    <linearGradient id="bg" x1="56" y1="40" x2="456" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121826"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="screenBlue" x1="198" y1="98" x2="412" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5F9FFF"/>
      <stop offset="1" stop-color="#2C77F0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- External display -->
  <rect x="184" y="84" width="242" height="176" rx="24" fill="#8F949B"/>
  <rect x="198" y="98" width="214" height="148" rx="12" fill="url(#screenBlue)"/>
  <path d="M290 260H320L330 294H280Z" fill="#8F949B"/>
  <rect x="258" y="294" width="94" height="16" rx="8" fill="#8F949B"/>


  <!-- Simple desktop window -->
  <rect x="224" y="122" width="112" height="78" rx="10" fill="#F5F7FA"/>
  <rect x="224" y="122" width="112" height="20" rx="10" fill="#D6E5FF"/>
  <rect x="224" y="132" width="112" height="10" fill="#D6E5FF"/>
  <circle cx="238" cy="132" r="3.5" fill="#448AFF"/>
  <circle cx="249" cy="132" r="3.5" fill="#8CB7FF"/>
  <rect x="239" y="153" width="62" height="8" rx="4" fill="#448AFF" opacity="0.80"/>
  <rect x="239" y="169" width="44" height="7" rx="3.5" fill="#AFCBFA"/>

  <!-- Actual app cursor: gray ring with a light center dot -->
  <circle cx="365" cy="159" r="18"
          fill="none"
          stroke="#9E9E9E"
          stroke-width="6"
          opacity="0.78"/>
  <circle cx="365" cy="159" r="4"
          fill="#E0E0E0"
          opacity="0.86"/>
<!-- Slim smartphone body -->
  <rect x="92" y="170" width="166" height="278" rx="36" fill="#A0A0A0"/>
  <rect x="105" y="183" width="140" height="252" rx="26" fill="#000000"/>

  <!-- Touchpad crosshair -->
  <path d="M128 310H222M175 263V357"
        fill="none"
        stroke="#D0D0D0"
        stroke-width="10"
        stroke-linecap="round"
        opacity="0.96"/>

  <!-- Touch point -->
  <circle cx="205" cy="342" r="10" fill="#448AFF"/>
  <circle cx="205" cy="342" r="24"
          fill="none"
          stroke="#448AFF"
          stroke-width="5"
          opacity="0.30"/>
</svg>
